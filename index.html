<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Arithmetic Calculator</title>
</head>
<body>
    <div>
      <h1 style="margin: 10px;">Arithmetic Calculator</h1>
    </div>

    <div class="container">
      <div class="row">
        <div class=" column col-lg-4 col-sm-1">
          <div>
            <input id="num1" type="number" placeholder="Number 1">
          </div>
        </div>

        <div class=" column col-lg-4 col-sm-1">
          <div>
            <input id="num2" type="number" placeholder="Number 2">
          </div>
        </div>
      </div>

      <div class="row">
        <div class=" column-op col-lg-4 col-sm-1">
          <button id="addition">+</button> 
        </div>
        <div class=" column-op col-lg-4 col-sm-1">
          <button id="subtraction">-</button> 
        </div>
        <div class=" column-op col-lg-4 col-sm-1">
          <button id="mult">*</button>
        </div>
        <div class=" column-op col-lg-4 col-sm-1">
          <button id="div">÷</button>
        </div>
      </div>

      <div class="row">
        <div class=" Result column-res col-lg-4 col-sm-1">
          <button id="result">Result</button>
        </div>
        <div class=" RESULT column-res col-lg-4 col-sm-1">
          <input type="number" readonly id="RESULT">
        </div>
      </div>

      <div class="row">
        <div class="column-res">
          <button id="reset">RESET</button>
        </div>
      </div>
    </div>
      
    

    <!-- JavaScript Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
